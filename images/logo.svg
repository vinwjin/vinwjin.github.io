<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a84ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5e5ce6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="#0f0f23"/>
  <!-- Circuit board pattern -->
  <g stroke="#1e3a5f" stroke-width="2" fill="none">
    <path d="M60 100 L120 100 L120 140"/>
    <path d="M452 100 L392 100 L392 140"/>
    <path d="M60 412 L120 412 L120 372"/>
    <path d="M452 412 L392 412 L392 372"/>
    <circle cx="120" cy="140" r="6" fill="#1e3a5f"/>
    <circle cx="392" cy="140" r="6" fill="#1e3a5f"/>
    <circle cx="120" cy="372" r="6" fill="#1e3a5f"/>
    <circle cx="392" cy="372" r="6" fill="#1e3a5f"/>
  </g>
  <!-- V letter with circuit effect -->
  <g filter="url(#glow)">
    <path d="M140 150 L256 380 L372 150" 
          stroke="url(#grad1)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Circuit nodes on V -->
    <circle cx="140" cy="150" r="12" fill="#0a84ff"/>
    <circle cx="256" cy="380" r="10" fill="#5e5ce6"/>
    <circle cx="372" cy="150" r="12" fill="#0a84ff"/>
    <!-- Connection dots -->
    <circle cx="200" cy="200" r="4" fill="#00d4ff"/>
    <circle cx="312" cy="200" r="4" fill="#00d4ff"/>
    <circle cx="256" cy="280" r="5" fill="#00d4ff"/>
  </g>
  <!-- Tech accent lines -->
  <line x1="180" y1="420" x2="332" y2="420" stroke="#5e5ce6" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
