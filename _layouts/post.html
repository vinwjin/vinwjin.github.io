---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date: "%Y-%m-%d" }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.categories %} · {{ page.categories | join: " / " }}{% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
