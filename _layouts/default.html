<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{ page.seo }}
  <title>{{ page.title }} - {{ site.title }}</title>
  <style>
    :root {
      --bg: #fafafa;
      --text: #24292f;
      --card: #ffffff;
      --border: #eaeaea;
      --accent: #0969da;
      --code-bg: #f6f8fa;
      --code-text: #24292f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --text: #c9d1d9;
        --card: #161b22;
        --border: #30363d;
        --accent: #58a6ff;
        --code-bg: #1c2128;
        --code-text: #c9d1d9;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.2s, color 0.2s;
    }

    .site-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 0;
    }

    .site-header .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    .site-title:hover {
      color: var(--accent);
    }

    .site-nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-nav a {
      color: var(--text);
      opacity: 0.8;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .site-nav a:hover {
      opacity: 1;
      color: var(--accent);
    }

    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .post-list {
      list-style: none;
    }

    .post-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }

    .post-item:hover {
      border-color: var(--accent);
    }

    .post-link {
      color: var(--accent);
      font-size: 1.2rem;
      font-weight: 500;
      text-decoration: none;
    }

    .post-link:hover {
      text-decoration: underline;
    }

    .post-meta {
      color: var(--text);
      opacity: 0.6;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .post-excerpt {
      margin-top: 0.75rem;
      color: var(--text);
      opacity: 0.85;
    }

    .site-footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      text-align: center;
      color: var(--text);
      opacity: 0.6;
      font-size: 0.875rem;
    }

    .site-footer a {
      color: var(--accent);
    }

    .post-header {
      margin-bottom: 2rem;
    }

    .post-title {
      font-size: 2rem;
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }

    .post-content h2 {
      font-size: 1.5rem;
      margin-top: 2rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .post-content h3 {
      font-size: 1.2rem;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }

    .post-content p {
      margin-bottom: 1rem;
    }

    .post-content ul, .post-content ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }

    .post-content li {
      margin-bottom: 0.5rem;
    }

    .post-content pre {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .post-content code {
      font-family: Consolas, Monaco, "Andale Mono", monospace;
      font-size: 0.9em;
    }

    .post-content p code {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 0.2em 0.4em;
      border-radius: 4px;
    }

    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .post-content th, .post-content td {
      border: 1px solid var(--border);
      padding: 0.75rem;
      text-align: left;
    }

    .post-content th {
      background: var(--card);
    }

    .post-content blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
      margin-left: 0;
      margin-bottom: 1rem;
      opacity: 0.85;
    }

    .post-content a {
      color: var(--accent);
    }

    .post-content strong {
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .site-header .wrap {
        flex-direction: column;
        gap: 1rem;
      }
      .post-item {
        padding: 1.25rem;
      }
      .post-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="site-title" href="{{ site.baseurl }}/">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ site.baseurl }}/">首页</a>
        <a href="{{ site.baseurl }}/about.html">关于</a>
      </nav>
    </div>
  </header>

  <main class="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ site.time | date: "%Y" }} <a href="https://github.com/{{ site.github_username }}">{{ site.author.name }}</a></p>
  </footer>
</body>
</html>
