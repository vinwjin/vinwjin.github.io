<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vinwjin Lab - 折腾记录</title>
  <style>
    :root {
      --bg-color: #f5f5f5;
      --text-color: #333;
      --card-bg: #fff;
      --accent: #0366d6;
      --border: #eee;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #1a1a2e;
        --text-color: #e0e0e0;
        --card-bg: #16213e;
        --accent: #4dabf7;
        --border: #2a2a4a;
      }
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }
    
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      color: var(--text-color);
      opacity: 0.7;
      font-size: 1.1rem;
    }
    
    .tagline {
      margin-top: 0.5rem;
      opacity: 0.6;
      font-size: 0.95rem;
    }
    
    main {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: background 0.3s, box-shadow 0.3s;
    }
    
    h2 {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--border);
    }
    
    .post {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .post:last-child { border-bottom: none; }
    
    .post a {
      color: var(--accent);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
    }
    
    .post a:hover {
      text-decoration: underline;
    }
    
    .post-date {
      color: var(--text-color);
      opacity: 0.5;
      font-size: 0.85rem;
      margin-left: 0.5rem;
    }
    
    footer {
      text-align: center;
      margin-top: 3rem;
      opacity: 0.5;
      font-size: 0.9rem;
    }
    
    @media (max-width: 600px) {
      .container { padding: 2rem 1rem; }
      h1 { font-size: 2rem; }
      main { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 Vinwjin Lab</h1>
      <p class="subtitle">折腾是最好的学习方式</p>
      <p class="tagline">AI · NAS · 技术宅</p>
    </header>
    
    <main>
      <h2>📚 最新文章</h2>
      <div class="post">
        <a href="/posts/openclaw-setup/">OpenClaw 安装配置指南</a>
        <span class="post-date">2026-03-11</span>
      </div>
      <div class="post">
        <a href="/posts/fnnas-start/">飞牛NAS折腾记录</a>
        <span class="post-date">2026-03-11</span>
      </div>
      <div class="post">
        <a href="/posts/welcome/">欢迎来到 Vinwjin Lab</a>
        <span class="post-date">2026-03-11</span>
      </div>
    </main>
    
    <footer>
      <p>© 2026 Vinwjin</p>
    </footer>
  </div>
</body>
</html>
