# Hexo Configuration

title: Vinwjin Lab
description: 折腾记录 & 经验分享 - AI、NAS、技术宅
author: Vinwjin
language: zh-CN
timezone: Asia/Shanghai

url: https://vinwjin.github.io
root: /
permalink: /posts/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  external_target: _blank
  rel: false
filename_case: 0
render_drafts: false
future: false
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude
include:
exclude:
ignore:

# Deployment
deploy:
  type: git
  repo: https://github.com/vinwjin/vinwjin.github.io.git
  branch: gh-pages

# Extensions
theme: butterfly

# Sitemap
sitemap:
  path: sitemap.xml
feed:
  path: atom.xml
  limit: 20

# Word count
wordcount:
  enable: true
