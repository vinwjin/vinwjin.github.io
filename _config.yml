title: Vinwjin Lab
description: 折腾记录 & 经验分享 - AI、NAS、技术宅
theme: jekyll-theme-minima

url: https://vinwjin.github.io
baseurl: ""

author:
  name: Vinwjin
  email: vinwjin@github.com

github_username: vinwjin

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-archives

paginate: 10
paginate_path: "/page:num/"

jekyll-archives:
  enabled: [categories, tags]
  layouts: [archive]
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
