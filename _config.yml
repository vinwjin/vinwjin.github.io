# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Language
lang: zh

# Timezone
timezone: Asia/Shanghai

# Title
title: Vinwjin

tagline: 折腾记录 & 经验分享

description: AI、NAS、技术宅的折腾笔记

# URL
url: https://vinwjin.github.io
baseurl: ""

# Author
github:
  username: vinwjin

social:
  name: Vinwjin
  email: vinwjin@github.com
  links:
    - https://github.com/vinwjin

# Theme mode
theme_mode: dark

# TOC
toc: true

# Comments
comments:
  provider:

# PWA
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: []

paginate: 10

# Jekyll plugins (required for Chirpy)
plugins:
  - jekyll-archives

jekyll-archives:
  enabled: [categories, tags]
  layouts: [archive]
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
