# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Language
lang: zh-CN

# Timezone
timezone: Asia/Shanghai

# Title
title: Vinwjin

tagline: 折腾记录 & 经验分享

description: AI、NAS、技术宅的折腾笔记

# URL
url: https://vinwjin.github.io
baseurl: ""

# Author
github: vinwjin

social:
  name: Vinwjin
  email: vinwjin@github.com
  links:
    - https://github.com/vinwjin

# Theme mode
theme_mode: dark

# Paginate
paginate: 10

# TOC
toc: true

# Comments (disabled)
comments:
  provider:

# PWA
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: []

# Exclude
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE

jekyll-archives:
  enabled: [categories, tags]
  layouts: [archive]
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
