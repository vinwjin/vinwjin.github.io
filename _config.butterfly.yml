# Butterfly Theme Configuration

# --------------------------------------
# Navigation Settings
# --------------------------------------
nav:
  logo:
    enable: true
    img: /img/butterfly-icon.png
  display_title: true
  display_post_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder
  关于: /about/ || fas fa-heart

# --------------------------------------
# Code Blocks Settings
# --------------------------------------
code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# Social media links
social:
  Github: https://github.com/vinwjin || fab fa-github || '#24292e'

# --------------------------------------
# Image Settings
# --------------------------------------
favicon: /img/favicon.png
avatar:
  img: /img/butterfly-icon.png
  effect: true

disable_top_img: false
default_top_img:
index_img:
archive_img:
tag_img:
category_img:

cover:
  index_enable: true
  index_img: /img/cover.jpg
  archives_enable: true
  archives_img: /img/cover.jpg

background: false
footer_bg: false

# --------------------------------------
# Home page
# --------------------------------------
index_site_info_top: true
index_post_content:
  enable: true
  method: 1
  content_length: 300
  footer: true

# --------------------------------------
# Post Settings
# --------------------------------------
toc:
  enable: true
  number: true
  init: true

post_meta:
  page:
    date_type: created
    categories: true
  post:
    date_type: created
    categories: true
    tags: true
    label: true

post_copyright:
  enable: true
  license: CC BY-NC-SA 4.0

reward:
  enable: false

related_post:
  enable: true
  limit: 5
  date_format: YYYY-MM-DD
  effect: true

# --------------------------------------
# Footer Settings
# --------------------------------------
footer:
  owner:
    since: 2026
  custom_text: 折腾是最好的学习方式

# --------------------------------------
# Sidebar Settings
# --------------------------------------
aside:
  enable: true
  align: right
  card_author:
    enable: true
    description: AI、NAS、技术宅
  card_recent_post:
    enable: true
    limit: 5
  card_categories:
    enable: true
  card_tags:
    enable: true
  card_archives:
    enable: true
  card_webinfo:
    enable: true

# --------------------------------------
# Rightside Settings
# --------------------------------------
rightside:
  enable: true
  hide: false
  show_title: true
  translate: false
  readmode: true
  darkmode: true
  full_page_toc: true
  rightside_scroll_percent: true

# --------------------------------------
# Search Settings
# --------------------------------------
search:
  enable: true
  type: local_search
  preload: true
  CDN:
  path: /js/search/local-search.js
  js_url: /js/search/local-search.js

# --------------------------------------
# Comments
# --------------------------------------
comments:
  use: gitalk
  sticky: 0
  gitalk:
    client_id:
    client_secret:
    repo: vinwjin.github.io
    owner: vinwjin
    admin: vinwjin
    language: zh-CN
  disqus:
    shortname:
    api_url:
    api_key:

# --------------------------------------
# Library Settings
# --------------------------------------
lightbox: true
medium_zoom: false
lazyload: false

# --------------------------------------
# Mathematics
# --------------------------------------
math:
  enable: false
  engine: mathjax

# --------------------------------------
# Analytics
# --------------------------------------
baidu_analytics:
google_analytics:

# --------------------------------------
# Misc
# --------------------------------------
mermaid: false
canvas_ribbon: false
canvas_nest: false
fireworks: false
click_heart: false
clickShowText: false
